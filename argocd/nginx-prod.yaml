apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-prod
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      valueFiles:
        - values-prod.yaml
    path: helm 
    repoURL: https://github.com/dnet0/python-helloworld.git
    targetRevision: HEAD
  # Sync policy
  syncPolicy: {}